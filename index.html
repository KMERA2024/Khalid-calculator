<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حاسبة أعمار الطلاب</title>

<style>
:root {
  --dark-green: #004d40;
  --gold-accent: #c2ac7f;
  --light-gold: #fdfaf2;
  --white: #ffffff;
}

* { box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background-color: #f1f3f4;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 10px;
}

.container {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  background: var(--white);
  padding: 1.2rem;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  border-top: 6px solid var(--dark-green);
  text-align: center;
}

h2 { color: var(--dark-green); font-size: 1.1rem; }

.input-row {
  display: grid;
  grid-template-columns: 1fr 1.2fr 1fr;
  gap: 8px;
}

label {
  font-size: 0.75rem;
  font-weight: bold;
  color: var(--dark-green);
}

select {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--gold-accent);
  border-radius: 6px;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 140px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.btn-main {
  background: var(--dark-green);
  color: white;
}

.calc-btn {
  background: var(--gold-accent);
  color: var(--dark-green);
}

.result-box {
  margin-top: 10px;
  padding: 10px;
  background: var(--light-gold);
  border-radius: 8px;
  border: 1px solid var(--gold-accent);
}

.stage {
  margin-top: 10px;
  padding: 15px;
  background: var(--dark-green);
  color: white;
  border-radius: 8px;
}

.footer {
  margin-top: 10px;
  font-weight: bold;
  color: var(--dark-green);
}
</style>
</head>

<body>

<div class="container">

  <!-- محول التاريخ -->
  <div class="card">
    <h2>محول التاريخ (هجري → ميلادي)</h2>

    <div class="input-row">
      <div>
        <label>اليوم</label>
        <select id="hDay"></select>
      </div>
      <div>
        <label>الشهر</label>
        <select id="hMonth"></select>
      </div>
      <div>
        <label>السنة</label>
        <select id="hYear"></select>
      </div>
    </div>

    <button class="btn-main" onclick="convertHijri()">تحويل</button>

    <div id="hResult" class="result-box" style="display:none;"></div>
  </div>


  <!-- حاسبة العمر -->
  <div class="card">
    <h2>حاسبة أعمار الطلاب</h2>

    <div class="input-row">
      <div>
        <label>اليوم</label>
        <select id="gDay"></select>
      </div>
      <div>
        <label>الشهر</label>
        <select id="gMonth"></select>
      </div>
      <div>
        <label>السنة</label>
        <select id="gYear"></select>
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()">احسب</button>

    <div id="result" style="display:none;">
      <div class="result-box">
        العمر:
        <div id="age"></div>
      </div>

      <div class="stage" id="stage"></div>
    </div>
  </div>

  <div class="footer">تصميم أ. خالد محمد الحربي 2026</div>

</div>

<!-- مكتبات التحويل -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<script>

// تعبئة القوائم
for(let i=1;i<=30;i++) hDay.innerHTML += `<option>${i}</option>`;
for(let i=1;i<=12;i++) hMonth.innerHTML += `<option>${i}</option>`;
for(let i=1460;i>=1400;i--) hYear.innerHTML += `<option>${i}</option>`;

for(let i=1;i<=31;i++) gDay.innerHTML += `<option>${i}</option>`;
for(let i=1;i<=12;i++) gMonth.innerHTML += `<option>${i}</option>`;
for(let i=2026;i>=2005;i--) gYear.innerHTML += `<option>${i}</option>`;

// تحويل هجري → ميلادي
function convertHijri(){
  const d = hDay.value;
  const m = hMonth.value;
  const y = hYear.value;

  const resultBox = document.getElementById("hResult");

  const date = moment(`${y}/${m}/${d}`, 'iYYYY/iM/iD');

  if(date.isValid()){
    resultBox.style.display = "block";
    resultBox.innerText =
      "التاريخ الميلادي: " +
      date.date() + "/" +
      (date.month()+1) + "/" +
      date.year();
  } else {
    resultBox.style.display = "block";
    resultBox.innerText = "⚠️ تاريخ غير صحيح";
  }
}

// حساب العمر
function calculate(){

  const d = parseInt(gDay.value);
  const m = parseInt(gMonth.value);
  const y = parseInt(gYear.value);

  const birth = new Date(y, m-1, d);
  const target = new Date(2026,7,24);

  if(isNaN(birth)){
    alert("تاريخ غير صحيح");
    return;
  }

  let years = target.getFullYear() - birth.getFullYear();
  let months = target.getMonth() - birth.getMonth();
  let days = target.getDate() - birth.getDate();

  if(days < 0){
    months--;
    days += new Date(target.getFullYear(), target.getMonth(), 0).getDate();
  }

  if(months < 0){
    years--;
    months += 12;
  }

  document.getElementById("result").style.display = "block";
  document.getElementById("age").innerText =
    years + " سنة - " + months + " شهر - " + days + " يوم";

  let stageText = "";

  const c1 = new Date(2020,7,24);
  const c2 = new Date(2020,10,22);
  const kg3 = new Date(2021,7,24);
  const kg2 = new Date(2022,7,24);
  const kg1 = new Date(2023,7,24);

  if(birth <= c1){
    stageText = "الصف الأول الابتدائي";
  }
  else if(birth <= c2){
    stageText = "الصف الأول الابتدائي (فئة ثانية بشرط روضة)";
  }
  else if(birth <= kg3){
    stageText = "رياض أطفال مستوى ثالث";
  }
  else if(birth <= kg2){
    stageText = "رياض أطفال مستوى ثاني";
  }
  else if(birth <= kg1){
    stageText = "رياض أطفال مستوى أول";
  }
  else{
    stageText = "دون سن القبول";
  }

  document.getElementById("stage").innerText = stageText;
}

</script>

</body>
</html>
