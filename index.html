<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة تسجيل الطلاب 1448هـ</title>
<style>
:root {
  --dark-green: #004d40;
  --gold-accent: #c2ac7f;
  --light-bg: #f2f5f7;
  --white: #ffffff;
}
body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--light-bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
.card { background: var(--white); width: 100%; max-width: 440px; border-radius: 25px; padding: 25px 20px; text-align: center; border-top: 10px solid var(--dark-green); box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; }
h2 { color: var(--dark-green); font-size: 1.4rem; margin: 0 0 20px 0; }
.input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.input-group label { display: block; font-size: 0.85rem; font-weight: bold; color: var(--dark-green); margin-bottom: 6px; }
select { width: 100%; padding: 10px 2px; border: 1px solid var(--gold-accent); border-radius: 8px; text-align: center; font-size: 1rem; }

.btn { background-color: var(--dark-green); color: white; border: none; border-radius: 8px; padding: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; transition: 0.3s; }
.btn:hover { opacity: 0.9; }

.divider { height: 2px; background-color: #eee; margin: 25px 0; }
.section-title { color: var(--dark-green); font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; }
.instruction-tag { background-color: #e8f5e9; color: var(--dark-green); padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; display: inline-block; margin-bottom: 15px; }

.result-box { margin-top: 15px; padding: 15px; border-radius: 10px; background-color: #fdfaf2; color: var(--dark-green); border: 1px solid var(--gold-accent); font-weight: bold; display: none; line-height: 1.8; }

.stage-highlight { background-color: var(--dark-green); color: white; padding: 15px; border-radius: 8px; margin-top: 10px; border-bottom: 4px solid #00332c; }
#stageText { font-size: 1.3rem; display: block; margin-bottom: 5px; }
#noteText { font-size: 1rem; display: block; font-weight: normal; opacity: 0.9; }

.footer { font-size: 0.95rem; color: var(--dark-green); font-weight: bold; margin-top: 20px; }
</style>
</head>
<body>

<div class="card">
  <h2>محول التاريخ (هجري إلى ميلادي)</h2>
  <div class="input-grid">
    <div class="input-group"><label>اليوم</label><select id="hDay"></select></div>
    <div class="input-group"><label>الشهر</label><select id="hMonth"></select></div>
    <div class="input-group"><label>السنة</label><select id="hYear"></select></div>
  </div>
  <button class="btn" onclick="convertDate()">تحويل التاريخ</button>
  <div id="convResult" class="result-box" style="background-color: #e8f5e9; color: #2e7d32; border-color: #a5d6a7;"></div>

  <div class="divider"></div>

  <div class="section-title">حساب عمر الطالب والصف المستحق</div>
  <div class="instruction-tag">📅 تاريخ ميلاد الطالب بالميلادي</div>

  <div class="input-grid">
    <div class="input-group"><label>اليوم</label><select id="gDay"></select></div>
    <div class="input-group"><label>الشهر</label><select id="gMonth"></select></div>
    <div class="input-group"><label>السنة</label><select id="gYear"></select></div>
  </div>

  <button class="btn" onclick="calculateAgeAndStage()" style="background-color: var(--gold-accent); color: var(--dark-green);">إحسب العمر والمرحلة</button>
  
  <div id="ageResult" class="result-box">
    <div id="ageText"></div>
    <div id="stageContainer" class="stage-highlight">
        <span id="stageText"></span>
        <span id="noteText"></span>
    </div>
  </div>
</div>

<div class="footer">تصميم أ. خالد محمد الحربي 2026</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<script>
const mNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
const hNames = ["1- محرم", "2- صفر", "3- ربيع الأول", "4- ربيع الثاني", "5- جمادى الأول", "6- جمادى الآخر", "7- رجب", "8- شعبان", "9- رمضان", "10- شوال", "11- ذو القعدة", "12- ذو الحجة"];

function init() {
    const hd = document.getElementById('hDay'), hm = document.getElementById('hMonth'), hy = document.getElementById('hYear');
    for(let i=1; i<=30; i++) hd.add(new Option(i, i));
    hNames.forEach((n, i) => hm.add(new Option(n, i+1)));
    for(let i=1460; i>=1380; i--) hy.add(new Option(i, i));
    hy.value = 1442; hm.value = 9; hd.value = 7;

    const gd = document.getElementById('gDay'), gm = document.getElementById('gMonth'), gy = document.getElementById('gYear');
    for(let i=1; i<=31; i++) gd.add(new Option(i, i));
    mNames.forEach((n, i) => gm.add(new Option(`${i+1}- ${n}`, i+1)));
    for(let i=2026; i>=1980; i--) gy.add(new Option(i, i));
    gy.value = 2020;
}

function convertDate() {
    const d = document.getElementById('hDay').value, m = document.getElementById('hMonth').value, y = document.getElementById('hYear').value;
    const res = document.getElementById('convResult');
    const date = moment(`${y}/${m}/${d}`, 'iYYYY/iM/iD');
    if(date.isValid()){
        res.innerHTML = `✅ يوافق بالميلادي: <br> ${date.date()} ${mNames[date.month()]} ${date.year()}م`;
        res.style.display = 'block';
    }
}

function calculateAgeAndStage() {
    const d = parseInt(document.getElementById('gDay').value);
    const m = parseInt(document.getElementById('gMonth').value);
    const y = parseInt(document.getElementById('gYear').value);
    
    const birthDate = moment(`${y}-${m}-${d}`, "YYYY-MM-DD");
    const targetDate = moment("2026-08-24", "YYYY-MM-DD"); 

    if(!birthDate.isValid()) return;

    const diff = moment.duration(targetDate.diff(birthDate));
    const years = diff.years();
    const months = diff.months();
    const days = diff.days();

    document.getElementById('ageText').innerHTML = `عمر الطالب عند بداية الدراسة هو:<br>${years} سنة و ${months} شهر و ${days} يوم`;
    
    const result = getStageByDate(birthDate, years);
    document.getElementById('stageText').innerText = result.stage;
    document.getElementById('noteText').innerText = result.note;
    document.getElementById('ageResult').style.display = 'block';
}

function getStageByDate(birthDate, years) {
    const d2020_08_24 = moment("2020-08-24", "YYYY-MM-DD");
    const d2020_11_22 = moment("2020-11-22", "YYYY-MM-DD");
    const d2021_08_24 = moment("2021-08-24", "YYYY-MM-DD");
    const d2022_08_24 = moment("2022-08-24", "YYYY-MM-DD");
    const d2023_08_24 = moment("2023-08-24", "YYYY-MM-DD");

    if (years > 21) return { stage: "الصف المستحق: تعليم مستمر", note: "" };
    
    if (years >= 12) {
        if (years == 12) return { stage: "يستحق: الصف الأول المتوسط", note: "" };
        if (years == 13) return { stage: "يستحق: الصف الثاني المتوسط", note: "" };
        if (years == 14) return { stage: "يستحق: الصف الثالث المتوسط", note: "" };
        if (years == 15) return { stage: "يستحق: الصف الأول الثانوي", note: "" };
        if (years == 16) return { stage: "يستحق: الصف الثاني الثانوي", note: "" };
        if (years >= 17) return { stage: "يستحق: الصف الثالث الثانوي", note: "" };
    }

    // تعديل القبول: مواليد 24-08-2020 وما قبل ذلك هم فئة أولى ابتدائي
    if (birthDate.isSameOrBefore(d2020_08_24)) {
        if (years == 6) return { stage: "الصف الأول الابتدائي", note: "الفئة الأولى: أكمل 6 سنوات" };
        if (years == 7) return { stage: "الصف الثاني الابتدائي", note: "" };
        if (years == 8) return { stage: "الصف الثالث الابتدائي", note: "" };
        if (years == 9) return { stage: "الصف الرابع الابتدائي", note: "" };
        if (years == 10) return { stage: "الصف الخامس الابتدائي", note: "" };
        if (years == 11) return { stage: "الصف السادس الابتدائي", note: "" };
    }
    
    // الفئة الثانية
    if (birthDate.isAfter(d2020_08_24) && birthDate.isSameOrBefore(d2020_11_22)) {
        return { stage: "الفئة الثانية: الصف الأول الابتدائي", note: "بشرط دراسة سنة كاملة في رياض الأطفال" };
    }
    
    // رياض الأطفال
    if (birthDate.isAfter(d2020_11_22) && birthDate.isSameOrBefore(d2021_08_24)) {
        return { stage: "رياض الأطفال - المستوى الثالث (KG3)", note: "" };
    }
    if (birthDate.isAfter(d2021_08_24) && birthDate.isSameOrBefore(d2022_08_24)) {
        return { stage: "رياض الأطفال - المستوى الثاني (KG2)", note: "" };
    }
    if (birthDate.isAfter(d2022_08_24) && birthDate.isSameOrBefore(d2023_08_24)) {
        return { stage: "رياض الأطفال - المستوى الأول (KG1)", note: "" };
    }

    return { stage: birthDate.isAfter(d2023_08_24) ? "دون سن القبول" : "مراجعة الإدارة", note: "" };
}

window.onload = init;
</script>
</body>
</html>
