<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة أعمار الطلاب - الإصدار المعتمد 2026</title>
    <style>
        :root {
            --dark-green: #004d40;
            --gold-accent: #c2ac7f;
            --light-gold: #fdfaf2;
            --white: #ffffff;
            --primary-bg: #f4f7f6;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border-top: 8px solid var(--dark-green);
            text-align: center;
        }

        h2 { color: var(--dark-green); font-size: 1.1rem; margin-bottom: 1.2rem; }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        label { display: block; font-size: 0.75rem; font-weight: bold; color: #555; margin-bottom: 5px; }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
        }

        button {
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-main { background: var(--dark-green); color: white; margin-bottom: 10px; }
        .calc-btn { background: var(--gold-accent); color: var(--dark-green); }

        .result-box {
            margin-top: 15px;
            padding: 12px;
            background: var(--light-gold);
            border-radius: 8px;
            border: 1px solid var(--gold-accent);
        }

        /* تنسيق العمر المطلوب: سنوات - أشهر - أيام */
        .age-display {
            direction: ltr; /* لجعل الترتيب من اليسار لليمين */
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--dark-green);
            display: inline-block;
            margin-top: 5px;
        }

        .stage {
            margin-top: 10px;
            padding: 15px;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.4s;
            display: none;
        }

        .footer { margin-top: 10px; font-weight: bold; color: var(--dark-green); text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">

    <div class="card">
        <h2>🔄 محول التاريخ الهجري</h2>
        <div class="input-row">
            <div><label>اليوم</label><select id="hDay"></select></div>
            <div><label>الشهر</label><select id="hMonth"></select></div>
            <div><label>السنة</label><select id="hYear"></select></div>
        </div>
        <button class="btn-main" onclick="convertHijri()">تحويل إلى ميلادي</button>
        <div id="hResult" class="result-box" style="display:none;"></div>
    </div>

    <div class="card">
        <h2>🎓 حاسبة قبول الطلاب (وفقاً للتعميم)</h2>
        <div class="input-row">
            <div><label>اليوم</label><select id="gDay"></select></div>
            <div><label>الشهر</label><select id="gMonth"></select></div>
            <div><label>السنة</label><select id="gYear"></select></div>
        </div>
        <button class="calc-btn" onclick="calculate()">احسب العمر والمرحلة</button>

        <div id="resultArea" style="display:none;">
            <div class="result-box">
                العمر (سنة - شهر - يوم):<br>
                <div class="age-display" id="ageOutput"></div>
            </div>
            <div class="stage" id="stageOutput"></div>
        </div>
    </div>

    <div class="footer">تصميم أ. خالد محمد الحربي 2026</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<script>
// تعبئة القوائم
window.onload = function() {
    for(let i=1;i<=30;i++) document.getElementById('hDay').innerHTML += `<option>${i}</option>`;
    for(let i=1;i<=12;i++) document.getElementById('hMonth').innerHTML += `<option>${i}</option>`;
    for(let i=1460;i>=1400;i--) document.getElementById('hYear').innerHTML += `<option>${i}</option>`;
    for(let i=1;i<=31;i++) document.getElementById('gDay').innerHTML += `<option>${i}</option>`;
    for(let i=1;i<=12;i++) document.getElementById('gMonth').innerHTML += `<option>${i}</option>`;
    for(let i=2026;i>=2008;i--) document.getElementById('gYear').innerHTML += `<option>${i}</option>`;
};

function convertHijri(){
    const d = document.getElementById("hDay").value;
    const m = document.getElementById("hMonth").value;
    const y = document.getElementById("hYear").value;
    const res = document.getElementById("hResult");
    const date = moment(`${y}/${m}/${d}`, 'iYYYY/iM/iD');
    if(date.isValid()){
        res.style.display = "block";
        res.innerText = "التاريخ الميلادي: " + date.format('YYYY/MM/DD');
    }
}

function calculate(){
    const d = parseInt(document.getElementById("gDay").value);
    const m = parseInt(document.getElementById("gMonth").value);
    const y = parseInt(document.getElementById("gYear").value);
    const birth = new Date(y, m-1, d);
    const target = new Date(2026, 7, 24); // تاريخ المقارنة لبداية العام الدراسي

    let years = target.getFullYear() - birth.getFullYear();
    let months = target.getMonth() - birth.getMonth();
    let days = target.getDate() - birth.getDate();

    if(days < 0){
        months--;
        days += new Date(target.getFullYear(), target.getMonth(), 0).getDate();
    }
    if(months < 0){
        years--;
        months += 12;
    }

    // عرض العمر (السنوات من اليسار)
    document.getElementById("resultArea").style.display = "block";
    document.getElementById("ageOutput").innerText = `${years}Y - ${months}M - ${days}D`;

    const stageOut = document.getElementById("stageOutput");
    stageOut.style.display = "block";
    
    let text = "";
    let color = "";

    // منطق الصورة المرفقة حرفياً
    if (birth <= new Date(2020, 7, 24)) {
        text = "الصف الأول الابتدائي (الفئة الأولى)";
        color = "#2e7d32";
    } else if (birth >= new Date(2020, 7, 25) && birth <= new Date(2020, 10, 22)) {
        text = "الصف الأول الابتدائي (الفئة الثانية - بشرط الروضة)";
        color = "#2e7d32";
    } else if (birth >= new Date(2020, 7, 25) && birth <= new Date(2021, 7, 24)) {
        text = "رياض الأطفال - المستوى الثالث (KG3)";
        color = "#ad1457";
    } else if (birth >= new Date(2021, 7, 25) && birth <= new Date(2022, 7, 24)) {
        text = "رياض الأطفال - المستوى الثاني (KG2)";
        color = "#ad1457";
    } else if (birth >= new Date(2022, 7, 25) && birth <= new Date(2023, 7, 24)) {
        text = "رياض الأطفال - المستوى الأول (KG1)";
        color = "#ad1457";
    } 
    // إضافة المراحل العليا
    else if (y <= 2010 && y >= 2008) {
        text = "المرحلة الثانوية";
        color = "#b8860b";
    } else if (y <= 2013 && y >= 2011) {
        text = "المرحلة المتوسطة";
        color = "#1565c0";
    } else if (y >= 2014 && y <= 2019) {
        text = "المرحلة الابتدائية (صفوف عليا)";
        color = "#2e7d32";
    } else {
        text = "دون سن القبول النظامي";
        color = "#546e7a";
    }

    stageOut.innerText = text;
    stageOut.style.backgroundColor = color;
}
</script>
</body>
</html>
