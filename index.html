<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محول التاريخ وحساب عمر الطالب</title>

<style>
:root {
  --dark-green: #004d40;
  --gold-accent: #c2ac7f;
  --light-bg: #f2f5f7;
  --white: #ffffff;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: var(--light-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.card {
  background: var(--white);
  width: 100%;
  max-width: 440px;
  border-radius: 25px;
  padding: 25px 20px;
  text-align: center;
  border-top: 10px solid var(--dark-green);
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

h2 {
  color: var(--dark-green);
  font-size: 1.4rem;
  margin-top: 0;
  margin-bottom: 20px;
}

.input-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.input-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: bold;
  color: var(--dark-green);
  margin-bottom: 6px;
}

select {
  width: 100%;
  padding: 10px 2px;
  border: 1px solid var(--gold-accent);
  border-radius: 8px;
  background-color: var(--white);
  text-align: center;
  font-size: 1rem;
  color: #333;
}

/* الأزرار */
.btn-container {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 15px;
}

.btn {
  background-color: var(--dark-green);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 12px;
  font-size: 1.1rem;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  width: 100%;
}

.btn:hover { opacity: 0.9; }

.divider {
  height: 2px;
  background-color: #eee;
  margin: 25px 0;
  width: 100%;
}

.section-title {
  color: var(--dark-green);
  font-size: 1.3rem;
  font-weight: bold;
  margin-bottom: 15px;
}

.instruction-tag {
  background-color: #e8f5e9;
  color: var(--dark-green);
  padding: 6px 15px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
  display: inline-block;
  margin-bottom: 15px;
}

.result-box {
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
  background-color: #e8f5e9;
  color: #2e7d32;
  border: 1px solid #a5d6a7;
  font-weight: bold;
  display: none;
  line-height: 1.6;
}

.footer {
  font-size: 0.95rem;
  color: var(--dark-green);
  font-weight: bold;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="card">
  <h2>محول التاريخ (هجري إلى ميلادي)</h2>
  
  <div class="input-grid">
    <div class="input-group">
      <label>اليوم</label>
      <select id="hDay"></select>
    </div>
    <div class="input-group">
      <label>الشهر</label>
      <select id="hMonth"></select>
    </div>
    <div class="input-group">
      <label>السنة</label>
      <select id="hYear"></select>
    </div>
  </div>

  <div class="btn-container">
    <button class="btn" onclick="convertDate()">تحويل</button>
    <button class="btn" onclick="setCurrentDate()">تاريخ اليوم</button>
  </div>
  
  <div id="convResult" class="result-box"></div>

  <div class="divider"></div>

  <div class="section-title">حساب عمر الطالب</div>
  <div class="instruction-tag">📅 تاريخ ميلاد الطالب بالميلادي</div>

  <div class="input-grid">
    <div class="input-group">
      <label>اليوم</label>
      <select id="gDay"></select>
    </div>
    <div class="input-group">
      <label>الشهر</label>
      <select id="gMonth"></select>
    </div>
    <div class="input-group">
      <label>السنة</label>
      <select id="gYear"></select>
    </div>
  </div>

  <button class="btn" onclick="calculateAge()">احسب العمر</button>
  
  <div id="ageResult" class="result-box" style="background-color: #fdfaf2; border-color: var(--gold-accent); color: var(--dark-green);"></div>
</div>

<div class="footer">تصميم أ. خالد محمد الحربي 2026</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<script>
const mNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
const hNames = ["1- محرم", "2- صفر", "3- ربيع الأول", "4- ربيع الثاني", "5- جمادى الأول", "6- جمادى الآخر", "7- رجب", "8- شعبان", "9- رمضان", "10- شوال", "11- ذو القعدة", "12- ذو الحجة"];

function init() {
    // تعبئة حقول الهجري
    const hd = document.getElementById('hDay'), hm = document.getElementById('hMonth'), hy = document.getElementById('hYear');
    for(let i=1; i<=30; i++) hd.add(new Option(i, i));
    hNames.forEach((n, i) => hm.add(new Option(n, i+1)));
    for(let i=1460; i>=1380; i--) hy.add(new Option(i, i));
    hy.value = 1442; hm.value = 9; hd.value = 7;

    // تعبئة حقول الميلادي (مستقلة)
    const gd = document.getElementById('gDay'), gm = document.getElementById('gMonth'), gy = document.getElementById('gYear');
    for(let i=1; i<=31; i++) gd.add(new Option(i, i));
    mNames.forEach((n, i) => gm.add(new Option(`${i+1}- ${n}`, i+1)));
    for(let i=2026; i>=2000; i--) gy.add(new Option(i, i));
    gy.value = 2020;
}

// وظيفة زر تاريخ اليوم
function setCurrentDate() {
    const now = moment();
    document.getElementById('hYear').value = now.iYear();
    document.getElementById('hMonth').value = now.iMonth() + 1;
    document.getElementById('hDay').value = now.iDate();
}

// وظيفة التحويل (من الهجري للميلادي)
function convertDate() {
    const d = document.getElementById('hDay').value, m = document.getElementById('hMonth').value, y = document.getElementById('hYear').value;
    const res = document.getElementById('convResult');
    const date = moment(`${y}/${m}/${d}`, 'iYYYY/iM/iD');
    
    if(date.isValid()){
        res.innerHTML = `✅ يوافق بالميلادي: <br> ${date.date()} ${mNames[date.month()]} ${date.year()}م`;
        res.style.display = 'block';
    } else {
        res.innerHTML = "⚠️ التاريخ الهجري غير صحيح";
        res.style.display = 'block';
    }
}

// وظيفة حساب العمر (بناءً على التاريخ الميلادي المستقل)
function calculateAge() {
    const d = parseInt(document.getElementById('gDay').value);
    const m = parseInt(document.getElementById('gMonth').value);
    const y = parseInt(document.getElementById('gYear').value);
    const res = document.getElementById('ageResult');
    
    const birthDate = moment([y, m - 1, d]);
    const today = moment(); // الحساب بناءً على تاريخ اليوم الفعلي

    if(!birthDate.isValid()) return;

    const diff = moment.duration(today.diff(birthDate));
    
    res.innerHTML = `🎂 عمر الطالب الحالي هو: <br> ${diff.years()} سنة و ${diff.months()} شهر و ${diff.days()} يوم`;
    res.style.display = 'block';
}

window.onload = init;
</script>

</body>
</html>
