<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>حاسبة تسجيل الطلاب 1448هـ</title>
  <style>
    :root {
      --dark-green: #004d40;
      --gold-accent: #c2ac7f;
      --light-gold: #fdfaf2;
      --white: #ffffff;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f3f4; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
    .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 15px; }
    .card { background: var(--white); padding: 1.2rem; border-radius: 12px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05); width: 100%; border-top: 6px solid var(--dark-green); text-align: center; }
    h2 { color: var(--dark-green); margin: 0; font-size: 1.1rem; }
    .sub-title { color: #555; font-size: 0.9rem; margin-top: 5px; margin-bottom: 10px; display: block; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    .instruction-tag { display: inline-block; color: var(--dark-green); padding: 4px 10px; font-size: 0.8rem; font-weight: bold; margin-bottom: 12px; }
    .input-row { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 8px; margin-bottom: 12px; align-items: end; }
    label { display: block; margin-bottom: 4px; font-weight: bold; color: var(--dark-green); font-size: 0.75rem; text-align: right; }
    select { width: 100%; padding: 10px 2px; border: 1px solid var(--gold-accent); border-radius: 6px; font-size: 0.9rem; text-align: center; color: var(--dark-green); background-color: var(--white); cursor: pointer; }
    .btn-container { display: flex; justify-content: center; margin-top: 5px; }
    .action-btn { width: 130px; padding: 10px; background-color: var(--dark-green); color: var(--white); border: 1px solid var(--gold-accent); border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: 0.3s; }
    .calculate-btn { background-color: var(--gold-accent); color: var(--dark-green); }
    .result-box { margin-top: 12px; padding: 12px; border-radius: 8px; background-color: var(--light-gold); border: 1px solid var(--gold-accent); color: var(--dark-green); font-size: 0.95rem; }
    .age-grid { display: flex; justify-content: space-around; direction: ltr; margin: 10px 0; }
    .age-val { font-size: 1.2rem; font-weight: bold; color: var(--dark-green); }
    .age-lbl { font-size: 0.7rem; color: #555; }
    .stage-highlight { background: var(--dark-green); color: white; padding: 18px 10px; border-radius: 8px; border-bottom: 4px solid var(--gold-accent); margin-top: 10px; }
    .stage-title { font-size: 0.85rem; opacity: 0.9; display: block; margin-bottom: 8px; }
    #resultText { font-size: 1.25rem; font-weight: 800; line-height: 1.5; }
    .footer { margin-top: 10px; color: var(--dark-green); font-size: 0.85rem; font-weight: bold; text-align: center; }
    .loading { opacity: 0.7; cursor: wait; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>محول التاريخ (هجري إلى ميلادي)</h2>
    <div class="input-row" style="margin-top:15px;">
      <div class="group"><label>اليوم</label><select id="cDay"></select></div>
      <div class="group"><label>الشهر</label><select id="cMonth"></select></div>
      <div class="group"><label>السنة</label><select id="cYear"></select></div>
    </div>
    <div class="btn-container">
      <button class="action-btn" id="convBtn">تحويل</button>
    </div>
    <div id="convResult" class="result-box" style="display:none;"></div>
  </div>

  <div class="card">
    <h2>حاسبة أعمار الطلاب للتسجيل للعام الدراسي (1448هـ)</h2>
    <span class="sub-title">العمر بداية العام الدراسي</span>
    <div class="instruction-tag">تاريخ ميلاد الطالب بالميلادي</div>
    <div class="input-row">
      <div class="group"><label>اليوم</label><select id="gDay"></select></div>
      <div class="group"><label>الشهر</label><select id="gMonth"></select></div>
      <div class="group"><label>السنة</label><select id="gYear"></select></div>
    </div>
    <div class="btn-container">
      <button class="action-btn calculate-btn" id="calcBtn">إحسب العمر</button>
    </div>
    <div id="resContainer" style="display:none;">
      <div class="result-box">
        <small style="font-weight: bold;">عمر الطالب عند بداية العام الدراسي:</small>
        <div class="age-grid">
          <div class="age-item"><span class="age-val" id="resY">0</span><span class="age-lbl">سنة</span></div>
          <div class="age-item"><span class="age-val" id="resM">0</span><span class="age-lbl">شهر</span></div>
          <div class="age-item"><span class="age-val" id="resD">0</span><span class="age-lbl">يوم</span></div>
        </div>
      </div>
      <div class="stage-highlight">
        <span class="stage-title">الصف الدراسي المستحق:</span>
        <div id="resultText"></div>
      </div>
    </div>
  </div>
  <div class="footer">تصميم أ. خالد محمد الحربي 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hijri-date@1.0.2/dist/hijri-date.min.js"></script>
<script>
  // بيانات الأشهر
  const mNames = ["1- يناير", "2- فبراير", "3- مارس", "4- أبريل", "5- مايو", "6- يونيو", "7- يوليو", "8- أغسطس", "9- سبتمبر", "10- أكتوبر", "11- نوفمبر", "12- ديسمبر"];
  const hNames = ["1- محرم", "2- صفر", "3- ربيع الأول", "4- ربيع الثاني", "5- جمادى الأول", "6- جمادى الآخر", "7- رجب", "8- شعبان", "9- رمضان", "10- شوال", "11- ذو القعدة", "12- ذو الحجة"];
  
  // أيام الأشهر الهجرية
  const hijriMonthDays = [30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29];

  // دالة تعبئة القوائم المنسدلة
  function fill(id, s, e, lbls, sel) {
    const el = document.getElementById(id);
    el.innerHTML = "";
    for (let i = s; i <= e; i++) {
      let opt = document.createElement('option');
      opt.value = i;
      opt.text = lbls ? lbls[i-1] : i;
      if (i === sel) opt.selected = true;
      el.appendChild(opt);
    }
  }

  // تهيئة القوائم
  function init() {
    fill('cDay', 1, 30);
    fill('cMonth', 1, 12, hNames, 1);
    fill('cYear', 1410, 1465, null, 1448);
    fill('gDay', 1, 31);
    fill('gMonth', 1, 12, mNames, 1);
    fill('gYear', 2005, 2026, null, 2020);
  }
  init();

  // تحويل التاريخ الهجري إلى ميلادي باستخدام خوارزمية دقيقة
  function hijriToGregorian(year, month, day) {
    // التحقق من صحة التاريخ
    if (year < 1 || month < 1 || month > 12 || day < 1) {
      return null;
    }
    
    // الحد الأقصى لأيام الشهر الهجري
    const maxDay = hijriMonthDays[month - 1];
    if (day > maxDay) {
      return null;
    }
    
    // تاريخ البدء: 1 محرم 1 هـ = 16 يوليو 622 م
    const baseGregorian = new Date(622, 6, 16); // يوليو = 6 (شهور JavaScript تبدأ من 0)
    
    // حساب عدد الأيام من 1 محرم 1 هـ إلى التاريخ المطلوب
    let totalDays = 0;
    
    // إضافة أيام السنوات الكاملة
    for (let y = 1; y < year; y++) {
      // السنة الهجرية الكبيسة: كل 30 سنة، 11 سنة كبيسة (الأعوام 2, 5, 7, 10, 13, 16, 18, 21, 24, 26, 29)
      const isLeap = (y % 30 === 2 || y % 30 === 5 || y % 30 === 7 || y % 30 === 10 || 
                      y % 30 === 13 || y % 30 === 16 || y % 30 === 18 || y % 30 === 21 || 
                      y % 30 === 24 || y % 30 === 26 || y % 30 === 29);
      totalDays += isLeap ? 355 : 354;
    }
    
    // إضافة أيام الأشهر في السنة الحالية
    for (let m = 1; m < month; m++) {
      totalDays += hijriMonthDays[m - 1];
    }
    
    // إضافة الأيام في الشهر الحالي
    totalDays += day - 1;
    
    // حساب التاريخ الميلادي
    const resultDate = new Date(baseGregorian);
    resultDate.setDate(resultDate.getDate() + totalDays);
    
    return resultDate;
  }

  // تحويل التاريخ الميلادي إلى هجري
  function gregorianToHijri(date) {
    // تاريخ البدء: 1 محرم 1 هـ = 16 يوليو 622 م
    const baseHijri = new Date(622, 6, 16);
    
    // حساب الفرق بالأيام
    const diffDays = Math.floor((date - baseHijri) / (1000 * 60 * 60 * 24));
    
    if (diffDays < 0) return null;
    
    let remainingDays = diffDays;
    let year = 1;
    let month = 1;
    
    // حساب السنة
    while (remainingDays >= 0) {
      const isLeap = (year % 30 === 2 || year % 30 === 5 || year % 30 === 7 || year % 30 === 10 || 
                      year % 30 === 13 || year % 30 === 16 || year % 30 === 18 || year % 30 === 21 || 
                      year % 30 === 24 || year % 30 === 26 || year % 30 === 29);
      const yearDays = isLeap ? 355 : 354;
      
      if (remainingDays < yearDays) {
        break;
      }
      remainingDays -= yearDays;
      year++;
    }
    
    // حساب الشهر واليوم
    for (let m = 0; m < 12; m++) {
      const monthDays = hijriMonthDays[m];
      if (remainingDays < monthDays) {
        month = m + 1;
        break;
      }
      remainingDays -= monthDays;
    }
    
    return {
      year: year,
      month: month,
      day: remainingDays + 1
    };
  }

  // تنسيق التاريخ الميلادي
  function formatGregorian(date) {
    const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
    return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}م`;
  }

  // دالة التحويل
  async function handleConversion() {
    const d = parseInt(document.getElementById('cDay').value);
    const m = parseInt(document.getElementById('cMonth').value);
    const y = parseInt(document.getElementById('cYear').value);
    const box = document.getElementById('convResult');
    const btn = document.getElementById('convBtn');
    
    box.style.display = 'block';
    box.innerText = "جاري التحويل...";
    btn.classList.add('loading');
    btn.disabled = true;
    
    try {
      const gregorianDate = hijriToGregorian(y, m, d);
      if (gregorianDate) {
        box.innerText = "التاريخ الميلادي: " + formatGregorian(gregorianDate);
      } else {
        box.innerText = "خطأ: التاريخ الهجري غير صحيح";
      }
    } catch (e) {
      console.error(e);
      box.innerText = "خطأ في التحويل";
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // دالة تحديد المرحلة الدراسية
  function getGradeStage(ageYears, ageMonths) {
    const totalMonths = ageYears * 12 + ageMonths;
    
    if (totalMonths < 48) return "غير مؤهل للالتحاق (أقل من 4 سنوات)";
    if (totalMonths < 60) return "رياض الأطفال - المستوى الأول (4 سنوات)";
    if (totalMonths < 72) return "رياض الأطفال - المستوى الثاني (5 سنوات)";
    if (totalMonths < 84) return "الصف الأول الابتدائي (6 سنوات)";
    if (totalMonths < 96) return "الصف الثاني الابتدائي (7 سنوات)";
    if (totalMonths < 108) return "الصف الثالث الابتدائي (8 سنوات)";
    if (totalMonths < 120) return "الصف الرابع الابتدائي (9 سنوات)";
    if (totalMonths < 132) return "الصف الخامس الابتدائي (10 سنوات)";
    if (totalMonths < 144) return "الصف السادس الابتدائي (11 سنوات)";
    if (totalMonths < 156) return "الصف الأول المتوسط (12 سنة)";
    if (totalMonths < 168) return "الصف الثاني المتوسط (13 سنة)";
    if (totalMonths < 180) return "الصف الثالث المتوسط (14 سنة)";
    if (totalMonths < 192) return "الصف الأول الثانوي (15 سنة)";
    if (totalMonths < 204) return "الصف الثاني الثانوي (16 سنة)";
    if (totalMonths < 216) return "الصف الثالث الثانوي (17 سنة)";
    return "أكثر من 17 سنة - متقدم للصف الثالث الثانوي أو أعلى";
  }

  // دالة حساب العمر والمرحلة
  async function checkEligibility() {
    const d = parseInt(document.getElementById('gDay').value);
    const m = parseInt(document.getElementById('gMonth').value);
    const y = parseInt(document.getElementById('gYear').value);
    const btn = document.getElementById('calcBtn');
    
    btn.innerText = "جاري الحساب...";
    btn.classList.add('loading');
    btn.disabled = true;
    
    try {
      const birth = new Date(y, m - 1, d);
      const target = new Date(2026, 7, 24); // 24 أغسطس 2026
      
      // التحقق من صحة التاريخ
      if (isNaN(birth.getTime())) {
        throw new Error("تاريخ ميلاد غير صحيح");
      }
      
      let diffY = target.getFullYear() - birth.getFullYear();
      let diffM = target.getMonth() - birth.getMonth();
      let diffD = target.getDate() - birth.getDate();
      
      if (diffD < 0) {
        diffM--;
        diffD += new Date(target.getFullYear(), target.getMonth(), 0).getDate();
      }
      if (diffM < 0) {
        diffY--;
        diffM += 12;
      }
      
      const stage = getGradeStage(diffY, diffM);
      
      document.getElementById('resContainer').style.display = 'block';
      document.getElementById('resY').innerText = diffY;
      document.getElementById('resM').innerText = diffM;
      document.getElementById('resD').innerText = diffD;
      document.getElementById('resultText').innerText = stage;
      
    } catch (e) {
      console.error(e);
      alert("حدث خطأ في الحساب: " + e.message);
    } finally {
      btn.innerText = "إحسب العمر";
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // ربط الأزرار بعد تحميل الصفحة
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('convBtn').addEventListener('click', handleConversion);
    document.getElementById('calcBtn').addEventListener('click', checkEligibility);
  });
</script>
</body>
</html>
