<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة تسجيل الطلاب 1448هـ</title>

<style>
:root {
  --dark-green: #004d40;
  --gold-accent: #c2ac7f;
  --light-bg: #f2f5f7;
  --white: #ffffff;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: var(--light-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.card {
  background: var(--white);
  width: 100%;
  max-width: 440px;
  border-radius: 25px;
  padding: 25px 20px;
  text-align: center;
  border-top: 10px solid var(--dark-green);
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

h2 { color: var(--dark-green); font-size: 1.4rem; margin: 0 0 20px 0; }

.input-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.input-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: bold;
  color: var(--dark-green);
  margin-bottom: 6px;
}

select {
  width: 100%;
  padding: 10px 2px;
  border: 1px solid var(--gold-accent);
  border-radius: 8px;
  text-align: center;
  font-size: 1rem;
}

.btn {
  background-color: var(--dark-green);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 12px;
  font-size: 1.1rem;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
  margin-bottom: 10px;
}

.divider { height: 2px; background-color: #eee; margin: 25px 0; }

.section-title { color: var(--dark-green); font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; }

.instruction-tag {
  background-color: #e8f5e9;
  color: var(--dark-green);
  padding: 6px 15px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
  display: inline-block;
  margin-bottom: 15px;
}

.result-box {
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
  background-color: #e8f5e9;
  color: #2e7d32;
  border: 1px solid #a5d6a7;
  font-weight: bold;
  display: none;
  line-height: 1.8;
}

.stage-highlight {
  background-color: var(--dark-green);
  color: white;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  font-size: 1.2rem;
  border-bottom: 4px solid var(--gold-accent);
}

.footer { font-size: 0.95rem; color: var(--dark-green); font-weight: bold; margin-top: 20px; }
</style>
</head>

<body>

<div class="card">
  <h2>محول التاريخ (هجري إلى ميلادي)</h2>
  <div class="input-grid">
    <div class="input-group"><label>اليوم</label><select id="hDay"></select></div>
    <div class="input-group"><label>الشهر</label><select id="hMonth"></select></div>
    <div class="input-group"><label>السنة</label><select id="hYear"></select></div>
  </div>
  <button class="btn" onclick="convertDate()">تحويل</button>
  <button class="btn" onclick="setCurrentDate()" style="background: #f1f3f4; color: #333; border: 1px solid #ccc;">تاريخ اليوم</button>
  <div id="convResult" class="result-box"></div>

  <div class="divider"></div>

  <div class="section-title">حساب عمر الطالب والصف المستحق</div>
  <div class="instruction-tag">📅 تاريخ ميلاد الطالب بالميلادي</div>

  <div class="input-grid">
    <div class="input-group"><label>اليوم</label><select id="gDay"></select></div>
    <div class="input-group"><label>الشهر</label><select id="gMonth"></select></div>
    <div class="input-group"><label>السنة</label><select id="gYear"></select></div>
  </div>

  <button class="btn" onclick="calculateAgeAndStage()" style="background-color: var(--gold-accent); color: var(--dark-green);">إحسب العمر والمرحلة</button>
  
  <div id="ageResult" class="result-box" style="background-color: #fdfaf2; border-color: var(--gold-accent); color: var(--dark-green);">
    <div id="ageText"></div>
    <div id="stageText" class="stage-highlight"></div>
  </div>
</div>

<div class="footer">تصميم أ. خالد محمد الحربي 2026</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<script>
const mNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
const hNames = ["1- محرم", "2- صفر", "3- ربيع الأول", "4- ربيع الثاني", "5- جمادى الأول", "6- جمادى الآخر", "7- رجب", "8- شعبان", "9- رمضان", "10- شوال", "11- ذو القعدة", "12- ذو الحجة"];

function init() {
    const hd = document.getElementById('hDay'), hm = document.getElementById('hMonth'), hy = document.getElementById('hYear');
    for(let i=1; i<=30; i++) hd.add(new Option(i, i));
    hNames.forEach((n, i) => hm.add(new Option(n, i+1)));
    for(let i=1460; i>=1380; i--) hy.add(new Option(i, i));
    hy.value = 1442; hm.value = 9; hd.value = 7;

    const gd = document.getElementById('gDay'), gm = document.getElementById('gMonth'), gy = document.getElementById('gYear');
    for(let i=1; i<=31; i++) gd.add(new Option(i, i));
    mNames.forEach((n, i) => gm.add(new Option(`${i+1}- ${n}`, i+1)));
    for(let i=2026; i>=2000; i--) gy.add(new Option(i, i));
    gy.value = 2020;
}

function setCurrentDate() {
    const now = moment();
    document.getElementById('hYear').value = now.iYear();
    document.getElementById('hMonth').value = now.iMonth() + 1;
    document.getElementById('hDay').value = now.iDate();
}

function convertDate() {
    const d = document.getElementById('hDay').value, m = document.getElementById('hMonth').value, y = document.getElementById('hYear').value;
    const res = document.getElementById('convResult');
    const date = moment(`${y}/${m}/${d}`, 'iYYYY/iM/iD');
    if(date.isValid()){
        res.innerHTML = `✅ يوافق بالميلادي: <br> ${date.date()} ${mNames[date.month()]} ${date.year()}م`;
        res.style.display = 'block';
    }
}

function calculateAgeAndStage() {
    const d = parseInt(document.getElementById('gDay').value);
    const m = parseInt(document.getElementById('gMonth').value);
    const y = parseInt(document.getElementById('gYear').value);
    
    const birthDate = moment([y, m - 1, d]);
    const targetDate = moment([2026, 7, 24]); // 24 أغسطس 2026

    if(!birthDate.isValid()) return;

    const diff = moment.duration(targetDate.diff(birthDate));
    const years = diff.years();
    const months = diff.months();

    document.getElementById('ageText').innerHTML = `عمر الطالب في 24-08-2026م هو:<br>${years} سنة و ${months} شهر و ${diff.days()} يوم`;
    document.getElementById('stageText').innerText = `المرحلة: ${getStage(years, months)}`;
    document.getElementById('ageResult').style.display = 'block';
}

function getStage(y, m) {
    const totalMonths = y * 12 + m;
    if (totalMonths < 36) return "دون سن الحضانة";
    if (totalMonths < 48) return "روضة - مستوى أول";
    if (totalMonths < 60) return "روضة - مستوى ثاني";
    if (totalMonths < 72) return "تمهيدي - مستوى ثالث";
    if (totalMonths < 84) return "الصف الأول الابتدائي";
    if (totalMonths < 96) return "الصف الثاني الابتدائي";
    if (totalMonths < 108) return "الصف الثالث الابتدائي";
    if (totalMonths < 120) return "الصف الرابع الابتدائي";
    if (totalMonths < 132) return "الصف الخامس الابتدائي";
    if (totalMonths < 144) return "الصف السادس الابتدائي";
    if (totalMonths < 156) return "الصف الأول المتوسط";
    if (totalMonths < 168) return "الصف الثاني المتوسط";
    if (totalMonths < 180) return "الصف الثالث المتوسط";
    if (totalMonths < 192) return "الصف الأول الثانوي";
    if (totalMonths < 204) return "الصف الثاني الثانوي";
    return "الصف الثالث الثانوي أو أعلى";
}

window.onload = init;
</script>

</body>
</html>
