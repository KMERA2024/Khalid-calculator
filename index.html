<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حاسبة تسجيل الطلاب 1448هـ</title>

  <style>
    :root {
      --dark-green: #004d40;
      --gold-accent: #c2ac7f;
      --white: #ffffff;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #e0f2f1, #f1f3f4);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: var(--white);
      padding: 1.5rem;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 420px;
      text-align: center;
      border-top: 6px solid var(--dark-green);
      margin-bottom: 20px;
    }

    h2, h3 {
      color: var(--dark-green);
      margin-bottom: 10px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 15px;
    }

    label {
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--dark-green);
      display: block;
      margin-bottom: 4px;
    }

    select {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--gold-accent);
      border-radius: 6px;
      text-align: center;
    }

    .btn {
      background: var(--dark-green);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-top: 6px;
    }

    .btn:hover {
      background: #00695c;
    }

    .result-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      background-color: #e8f5e9;
      border: 1px solid #4caf50;
      color: #2e7d32;
      font-weight: bold;
      display: none;
      transition: all 0.3s ease;
    }

    .footer {
      font-size: 0.8rem;
      color: var(--dark-green);
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>محول التاريخ (هجري إلى ميلادي)</h2>

  <div class="input-row">
    <div>
      <label>اليوم</label>
      <select id="hDay"></select>
    </div>

    <div>
      <label>الشهر</label>
      <select id="hMonth" onchange="updateDays()"></select>
    </div>

    <div>
      <label>السنة</label>
      <select id="hYear"></select>
    </div>
  </div>

  <button class="btn" onclick="convertNow()">تحويل</button>
  <button class="btn" onclick="setToday()">تاريخ اليوم</button>

  <div id="resShow" class="result-box"></div>

  <hr style="margin:15px 0;">

  <h3>حساب عمر الطالب</h3>

  <button class="btn" onclick="calculateAge()">احسب العمر</button>

  <div id="ageResult" class="result-box"></div>

</div>

<div class="footer">تصميم أ. خالد محمد الحربي 2026</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<script>
  const gMonthsNames = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const hMonthsNames = ["1- محرم","2- صفر","3- ربيع الأول","4- ربيع الثاني","5- جمادى الأول","6- جمادى الآخر","7- رجب","8- شعبان","9- رمضان","10- شوال","11- ذو القعدة","12- ذو الحجة"];

  function setup() {
    const d = document.getElementById('hDay');
    const m = document.getElementById('hMonth');
    const y = document.getElementById('hYear');

    hMonthsNames.forEach((name, i) => m.options.add(new Option(name, i + 1)));

    for(let i=1450; i>=1400; i--) {
      y.options.add(new Option(i, i));
    }

    m.value = 9;
    y.value = 1442;

    updateDays();
    d.value = 7;
  }

  function updateDays() {
    const m = document.getElementById('hMonth').value;
    const d = document.getElementById('hDay');

    d.innerHTML = "";

    let maxDays = (m % 2 === 1) ? 30 : 29;

    for(let i=1; i<=maxDays; i++) {
      d.options.add(new Option(i, i));
    }
  }

  function convertNow() {
    const d = +document.getElementById('hDay').value;
    const m = +document.getElementById('hMonth').value;
    const y = +document.getElementById('hYear').value;
    const display = document.getElementById('resShow');

    const mDate = moment(`${y}/${m}/${d}`, 'iYYYY/iM/iD');

    if(mDate.isValid()){
      const dayG = mDate.date();
      const monthG = gMonthsNames[mDate.month()];
      const yearG = mDate.year();

      display.innerHTML = `✅ التاريخ الميلادي: ${dayG} ${monthG} ${yearG}م<br><small>※ قد يختلف يوم حسب التقويم الرسمي</small>`;
      display.style.display = 'block';
    } else {
      display.innerHTML = "⚠️ التاريخ غير صحيح";
      display.style.display = 'block';
      display.style.backgroundColor = '#ffebee';
      display.style.color = '#c62828';
    }
  }

  function calculateAge(){
    const d = +document.getElementById('hDay').value;
    const m = +document.getElementById('hMonth').value;
    const y = +document.getElementById('hYear').value;

    const display = document.getElementById('ageResult');

    const birthDate = moment(`${y}/${m}/${d}`, 'iYYYY/iM/iD');

    if(!birthDate.isValid()){
      display.innerHTML = "⚠️ التاريخ غير صحيح";
      display.style.display = 'block';
      return;
    }

    const today = moment();

    const years = today.diff(birthDate, 'years');
    const months = today.diff(birthDate.clone().add(years, 'years'), 'months');
    const days = today.diff(birthDate.clone().add(years, 'years').add(months, 'months'), 'days');

    display.innerHTML = `🎂 العمر: ${years} سنة و ${months} شهر و ${days} يوم`;
    display.style.display = 'block';
  }

  function setToday(){
    const today = moment();
    const display = document.getElementById('resShow');

    display.innerHTML =
      `📅 اليوم: ${today.date()} ${gMonthsNames[today.month()]} ${today.year()}م`;
    display.style.display = 'block';
  }

  window.onload = setup;
</script>

</body>
</html>
