<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة أعمار الطلاب - الإصدار المطور 2026</title>
    <style>
        :root {
            --dark-green: #004d40;
            --gold-accent: #c2ac7f;
            --light-gold: #fdfaf2;
            --white: #ffffff;
            --primary-bg: #f4f7f6;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border-top: 8px solid var(--dark-green);
            text-align: center;
        }

        h2 { 
            color: var(--dark-green); 
            font-size: 1.2rem; 
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }

        select {
            width: 100%;
            padding: 12px 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            background-color: #fff;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }

        .btn-main { background: var(--dark-green); color: white; }
        .calc-btn { background: var(--gold-accent); color: var(--dark-green); }

        .result-box {
            margin-top: 15px;
            padding: 12px;
            background: var(--light-gold);
            border-radius: 8px;
            border: 1px dashed var(--gold-accent);
            font-weight: bold;
            color: #444;
        }

        .stage {
            margin-top: 15px;
            padding: 18px;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.5s ease;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            display: none; /* يظهر عند الحساب فقط */
        }

        .footer {
            margin-top: 5px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--dark-green);
            text-align: center;
        }
        
        .email { font-size: 0.8rem; color: #666; margin-top: 2px; }
    </style>
</head>
<body>

<div class="container">

    <div class="card">
        <h2>🔄 محول التاريخ (هجري ➔ ميلادي)</h2>
        <div class="input-row">
            <div><label>اليوم</label><select id="hDay"></select></div>
            <div><label>الشهر</label><select id="hMonth"></select></div>
            <div><label>السنة</label><select id="hYear"></select></div>
        </div>
        <button class="btn-main" onclick="convertHijri()">تحويل التاريخ</button>
        <div id="hResult" class="result-box" style="display:none;"></div>
    </div>

    <div class="card">
        <h2>🎓 حاسبة أعمار الطلاب (2026)</h2>
        <div class="input-row">
            <div><label>اليوم</label><select id="gDay"></select></div>
            <div><label>الشهر</label><select id="gMonth"></select></div>
            <div><label>السنة</label><select id="gYear"></select></div>
        </div>
        <button class="calc-btn" onclick="calculate()">احسب عمر الطالب والمرحلة</button>

        <div id="resultContainer" style="display:none;">
            <div class="result-box">
                العمر في بداية العام الدراسي:<br>
                <span id="ageText"></span>
            </div>
            <div class="stage" id="stageDisplay"></div>
        </div>
    </div>

    <div class="footer">تصميم أ. خالد محمد الحربي 2026</div>
    <div class="footer email">allihaibi@gmail.com</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<script>
// تعبئة القوائم المنسدلة عند التحميل
window.onload = function() {
    const hDay = document.getElementById('hDay');
    const hMonth = document.getElementById('hMonth');
    const hYear = document.getElementById('hYear');
    const gDay = document.getElementById('gDay');
    const gMonth = document.getElementById('gMonth');
    const gYear = document.getElementById('gYear');

    for(let i=1;i<=30;i++) hDay.innerHTML += `<option value="${i}">${i}</option>`;
    for(let i=1;i<=12;i++) hMonth.innerHTML += `<option value="${i}">${i}</option>`;
    for(let i=1460;i>=1400;i--) hYear.innerHTML += `<option value="${i}">${i}</option>`;

    for(let i=1;i<=31;i++) gDay.innerHTML += `<option value="${i}">${i}</option>`;
    for(let i=1;i<=12;i++) gMonth.innerHTML += `<option value="${i}">${i}</option>`;
    // تم تمديد السنوات لتشمل المرحلة الثانوية (مواليد 2008 وما بعدها)
    for(let i=2026;i>=2008;i--) gYear.innerHTML += `<option value="${i}">${i}</option>`;
};

function convertHijri(){
    const d = document.getElementById("hDay").value;
    const m = document.getElementById("hMonth").value;
    const y = document.getElementById("hYear").value;
    const resultBox = document.getElementById("hResult");

    const date = moment(`${y}/${m}/${d}`, 'iYYYY/iM/iD');

    if(date.isValid()){
        resultBox.style.display = "block";
        resultBox.innerHTML = "التاريخ الميلادي المقابل: <br>" + date.format('YYYY / MM / DD');
    } else {
        resultBox.style.display = "block";
        resultBox.innerText = "⚠️ عذراً، التاريخ غير صحيح";
    }
}

function calculate(){
    const d = parseInt(document.getElementById("gDay").value);
    const m = parseInt(document.getElementById("gMonth").value);
    const y = parseInt(document.getElementById("gYear").value);

    const birth = new Date(y, m-1, d);
    const target = new Date(2026, 7, 24); // تاريخ بداية العام الدراسي المعتمد 2026

    let years = target.getFullYear() - birth.getFullYear();
    let months = target.getMonth() - birth.getMonth();
    let days = target.getDate() - birth.getDate();

    if(days < 0){
        months--;
        days += new Date(target.getFullYear(), target.getMonth(), 0).getDate();
    }
    if(months < 0){
        years--;
        months += 12;
    }

    // إظهار النتائج
    document.getElementById("resultContainer").style.display = "block";
    document.getElementById("ageText").innerText = `${years} سنة و ${months} شهر و ${days} يوم`;

    const stageDisplay = document.getElementById("stageDisplay");
    stageDisplay.style.display = "block";
    
    let stageTitle = "";
    let bgColor = "";

    // منطق تحديد المراحل والألوان
    if (y <= 2010 && y >= 2008) {
        stageTitle = "المرحلة الثانوية 🎓";
        bgColor = "#b8860b"; // ذهبي للمرحلة الثانوية
    } 
    else if (y <= 2013 && y >= 2011) {
        stageTitle = "المرحلة المتوسطة 📘";
        bgColor = "#1565c0"; // أزرق للمرحلة المتوسطة
    } 
    else if (y <= 2019 && y >= 2014) {
        // تفصيل أدق للمرحلة الابتدائية والروضة بناءً على الشهور لعام 2026
        if (birth <= new Date(2020, 7, 24)) {
            stageTitle = "المرحلة الابتدائية 📗";
            bgColor = "#2e7d32"; // أخضر للابتدائية
        } else if (birth <= new Date(2020, 10, 22)) {
            stageTitle = "أول ابتدائي (بشرط الروضة) 🏫";
            bgColor = "#2e7d32";
        } else {
            stageTitle = "مرحلة رياض الأطفال 🎈";
            bgColor = "#ad1457"; // وردي للروضة
        }
    } 
    else if (birth <= new Date(2023, 7, 24)) {
        stageTitle = "مرحلة رياض الأطفال 🎈";
        bgColor = "#ad1457";
    }
    else {
        stageTitle = "دون سن القبول النظامي 👶";
        bgColor = "#546e7a"; // رمادي
    }

    stageDisplay.innerText = stageTitle;
    stageDisplay.style.backgroundColor = bgColor;
}
</script>

</body>
</html>
