<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حاسبة أعمار الطلاب</title>

<style>
:root {
  --dark-green: #004d40;
  --gold-accent: #c2ac7f;
  --light-gold: #fdfaf2;
  --white: #ffffff;
}

* { box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background-color: #f1f3f4;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 10px;
}

.container {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  background: var(--white);
  padding: 1.2rem;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  border-top: 6px solid var(--dark-green);
  text-align: center;
}

h2 { color: var(--dark-green); font-size: 1.1rem; }

.sub-title {
  color: #555;
  font-size: 0.9rem;
  margin: 8px 0;
  font-weight: bold;
}

.input-row {
  display: grid;
  grid-template-columns: 1fr 1.2fr 1fr;
  gap: 8px;
}

label {
  font-size: 0.75rem;
  font-weight: bold;
  color: var(--dark-green);
}

select {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--gold-accent);
  border-radius: 6px;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 140px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.calc-btn {
  background: var(--gold-accent);
  color: var(--dark-green);
}

.result-box {
  margin-top: 10px;
  padding: 10px;
  background: var(--light-gold);
  border-radius: 8px;
  border: 1px solid var(--gold-accent);
}

.stage {
  margin-top: 10px;
  padding: 15px;
  background: var(--dark-green);
  color: white;
  border-radius: 8px;
}

.footer {
  margin-top: 10px;
  font-weight: bold;
  color: var(--dark-green);
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>حاسبة أعمار الطلاب</h2>

    <div class="input-row">
      <div>
        <label>اليوم</label>
        <select id="day"></select>
      </div>
      <div>
        <label>الشهر</label>
        <select id="month"></select>
      </div>
      <div>
        <label>السنة</label>
        <select id="year"></select>
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()">احسب</button>

    <div id="result" style="display:none;">
      <div class="result-box">
        العمر:
        <div id="age"></div>
      </div>

      <div class="stage" id="stage"></div>
    </div>

  </div>

  <div class="footer">تصميم أ. خالد محمد الحربي 2026</div>

</div>

<script>

// تعبئة القوائم
for(let i=1;i<=31;i++) day.innerHTML += `<option>${i}</option>`;
for(let i=1;i<=12;i++) month.innerHTML += `<option>${i}</option>`;
for(let i=2026;i>=2005;i--) year.innerHTML += `<option>${i}</option>`;

function calculate(){

  const d = parseInt(day.value);
  const m = parseInt(month.value);
  const y = parseInt(year.value);

  const birth = new Date(y, m-1, d);
  const target = new Date(2026,7,24);

  if(isNaN(birth)){
    alert("تاريخ غير صحيح");
    return;
  }

  // حساب العمر
  let years = target.getFullYear() - birth.getFullYear();
  let months = target.getMonth() - birth.getMonth();
  let days = target.getDate() - birth.getDate();

  if(days < 0){
    months--;
    days += new Date(target.getFullYear(), target.getMonth(), 0).getDate();
  }

  if(months < 0){
    years--;
    months += 12;
  }

  document.getElementById("result").style.display = "block";
  document.getElementById("age").innerText = years + " سنة - " + months + " شهر - " + days + " يوم";

  // تحديد المرحلة (الحل النهائي 🔥)
  let stageText = "";

  const c1 = new Date(2020,7,24);
  const c2 = new Date(2020,10,22);
  const kg3 = new Date(2021,7,24);
  const kg2 = new Date(2022,7,24);
  const kg1 = new Date(2023,7,24);

  if(birth <= c1){
    stageText = "الصف الأول الابتدائي";
  }
  else if(birth <= c2){
    stageText = "الصف الأول الابتدائي (فئة ثانية بشرط روضة)";
  }
  else if(birth <= kg3){
    stageText = "رياض أطفال مستوى ثالث";
  }
  else if(birth <= kg2){
    stageText = "رياض أطفال مستوى ثاني";
  }
  else if(birth <= kg1){
    stageText = "رياض أطفال مستوى أول";
  }
  else{
    stageText = "دون سن القبول";
  }

  document.getElementById("stage").innerText = stageText;
}

</script>

</body>
</html>
