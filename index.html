<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حاسبة تسجيل الطلاب 1448هـ</title>
  <style>
    :root {
      --dark-green: #004d40;
      --gold-accent: #c2ac7f;
      --light-gold: #fdfaf2;
      --white: #ffffff;
      --success-bg: #e8f5e9;
      --success-text: #2e7d32;
    }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f3f4; display: flex; justify-content: center; padding: 20px; }
    .card { background: var(--white); padding: 1.5rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; border-top: 8px solid var(--dark-green); }
    h2 { color: var(--dark-green); margin-bottom: 20px; font-size: 1.2rem; }
    .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    label { display: block; font-size: 0.8rem; font-weight: bold; color: var(--dark-green); margin-bottom: 5px; }
    select { width: 100%; padding: 10px; border: 1px solid var(--gold-accent); border-radius: 8px; background: var(--white); text-align: center; font-size: 0.9rem; }
    .btn-convert { background: var(--dark-green); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; width: 100%; transition: 0.3s; }
    .btn-convert:hover { background: #00332c; }
    .result-area { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; font-size: 1.1rem; border: 1px solid #c8e6c9; line-height: 1.6; }
    .result-success { display: block !important; background-color: var(--success-bg); color: var(--success-text); }
  </style>
</head>
<body>

<div class="card">
  <h2>محول التاريخ (هجري إلى ميلادي)</h2>
  
  <div class="input-grid">
    <div>
      <label>اليوم</label>
      <select id="hDay"></select>
    </div>
    <div>
      <label>الشهر</label>
      <select id="hMonth"></select>
    </div>
    <div>
      <label>السنة</label>
      <select id="hYear"></select>
    </div>
  </div>

  <button class="btn-convert" onclick="convertDate()">تحويل</button>

  <div id="result" class="result-area"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<script>
  const gMonths = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
  const hMonthsNames = ["1- محرم", "2- صفر", "3- ربيع الأول", "4- ربيع الثاني", "5- جمادى الأول", "6- جمادى الآخر", "7- رجب", "8- شعبان", "9- رمضان", "10- شوال", "11- ذو القعدة", "12- ذو الحجة"];

  function init() {
    const dSel = document.getElementById('hDay');
    const mSel = document.getElementById('hMonth');
    const ySel = document.getElementById('hYear');

    for(let i=1; i<=30; i++) dSel.options.add(new Option(i, i));
    hMonthsNames.forEach((name, i) => mSel.options.add(new Option(name, i + 1)));
    for(let i=1450; i>=1400; i--) ySel.options.add(new Option(i, i));
    
    // القيم الافتراضية للتجربة (6 رمضان 1442)
    dSel.value = 6;
    mSel.value = 9;
    ySel.value = 1442;
  }

  function convertDate() {
    const d = document.getElementById('hDay').value;
    const m = document.getElementById('hMonth').value;
    const y = document.getElementById('hYear').value;
    const resDiv = document.getElementById('result');

    try {
      // السطر الأهم: تحويل الهجري لميلادي حقيقي
      const mDate = moment(`${y}/${m}/${d}`, 'iYYYY/iM/iD');
      
      if (mDate.isValid()) {
        // استخراج تفاصيل التاريخ الميلادي الفعلي بعد التحويل
        const dayG = mDate.date(); 
        const monthG = gMonths[mDate.month()];
        const yearG = mDate.year(); // هنا سيظهر 2021 وليس 1442

        resDiv.innerHTML = `✅ التاريخ الميلادي: <br> <b>${dayG} ${monthG} ${yearG}م</b>`;
        resDiv.className = 'result-area result-success';
        resDiv.style.display = 'block';
      } else {
        throw new Error();
      }
    } catch (e) {
      resDiv.innerHTML = "⚠️ التاريخ غير متوفر في التقويم، جرب يوم 29 أو تأكد من الشهر.";
      resDiv.className = 'result-area';
      resDiv.style.display = 'block';
      resDiv.style.backgroundColor = '#fff3e0';
      resDiv.style.color = '#e65100';
    }
  }

  window.onload = init;
</script>

</body>
</html>
